name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt pytest ruff

      - name: Lint (ruff)
        run: ruff check factura_ai tests

      - name: Tests
        run: pytest tests/ -v

      - name: Demo del CLI sobre las facturas de ejemplo
        run: python -m factura_ai.cli data/samples
